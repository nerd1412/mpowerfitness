<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" fill="none">
  <!-- Ghost italic M — background branding element -->
  <text x="0" y="110"
    font-family="'Inter', 'Arial Black', sans-serif"
    font-size="140" font-weight="900" font-style="italic"
    fill="#1e2230" letter-spacing="-6" opacity="0.8">M</text>

  {/* Left accent bar (The original orange vertical) */}
  <rect x="15" y="30" width="6" height="60" rx="2" fill="#FF5F1F"/>

  {/* MPower wordmark — clean, modern, professional */}
  <text x="32" y="80"
    font-family="'Inter', 'Arial Black', sans-serif"
    font-size="60" font-weight="900"
    fill="#F0F2F5" letter-spacing="-1.5">MPower</text>

  {/* Underline slash bar (The original neon lime bar) */}
  <rect x="32" y="90" width="370" height="8" rx="2" fill="#C8F135"/>

  {/* FITNESS text — spaced perfectly to match the width above */}
  <text x="32" y="112"
    font-family="'Inter', sans-serif"
    font-size="14" font-weight="700"
    letter-spacing="18" fill="#C8F135" text-transform="uppercase">FITNESS</text>
</svg>
