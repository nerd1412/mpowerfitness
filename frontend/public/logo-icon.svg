<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Rounded dark container -->
  <rect width="80" height="80" rx="16" fill="#111318"/>

  {/* Ghost italic M in background */}
  <text x="-4" y="70"
    font-family="'Inter', 'Arial Black', sans-serif"
    font-size="80" font-weight="900" font-style="italic"
    fill="#1e2230" letter-spacing="-4" opacity="0.8">M</text>

  {/* Left orange accent bar */}
  <rect x="12" y="20" width="5" height="40" rx="2" fill="#FF5F1F"/>

  {/* Bold M foreground — the focal point */}
  <text x="18" y="55"
    font-family="'Inter', 'Arial Black', sans-serif"
    font-size="44" font-weight="900"
    fill="#F0F2F5" letter-spacing="-1">M</text>

  {/* Lime ground bar */}
  <rect x="14" y="60" width="52" height="6" rx="1" fill="#C8F135"/>
</svg>
