version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mpower_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
      UPI_ID: ${UPI_ID:-payments@mpowerfitness}
      UPI_NAME: ${UPI_NAME:-Mpower Fitness}
    ports:
      - "5000:5000"
    networks:
      - mpower_network
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000/api

    container_name: mpower_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mpower_network

  nginx:
    image: nginx:alpine
    container_name: mpower_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - mpower_network

volumes:
  uploads_data:

networks:
  mpower_network:
    driver: bridge
