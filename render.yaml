services:
  # Backend API
  - type: web
    name: mpower-fitness-backend
    env: node
    plan: free # Change to starter/standard for production
    region: singapore # Change to your preferred region
    rootDirectory: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mpower-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # Frontend React App (Static Site)
  - type: static
    name: mpower-fitness-frontend
    env: static
    rootDirectory: frontend
    buildCommand: npm install && npm run build
    publishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: mpower-fitness-backend
          property: host

databases:
  - name: mpower-db
    plan: free # Change to starter for production
    region: singapore
